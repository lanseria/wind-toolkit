services:
  app:
    build: .
    pull_policy: never
    image: atmos-toolkit
    container_name: atmos-toolkit
    restart: unless-stopped
    volumes:
      - atmos-data:/app/data
      - atmos-outputs:/app/outputs
      - ${TILES_HOST_PATH:-./atmos-tiles}:/app/atmos-tiles
    env_file:
      - .env
    # 默认定时模式（--schedule 30），可通过 command 覆盖：
    # command: ["--forecast-hours", "48"]

volumes:
  atmos-data:
  atmos-outputs:
